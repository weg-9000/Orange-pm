# Neo4j self-hosting (multi-tenant SaaS — vector store)
#
# Started once on a VM/cloud instance. Neo4j 5.x for vector search.
# Usage:
#   cp .env.example .env   # fill in password etc. (.env is not tracked by git)
#   docker compose up -d
#   # Firewall: open only 7687 (bolt, app access) / 7474 (browser, internal network only)
#
# The ingestion/search side should point NEO4J_URI to bolt://<this-server-ip>:7687.
services:
  neo4j:
    image: neo4j:5.18      # Vector index GA (5.13+). 5.18 recommended.
    container_name: orange-pm-neo4j
    restart: unless-stopped
    ports:
      - "7687:7687"        # Bolt — application (embed_pipeline/context_search)
      - "7474:7474"        # HTTP browser — recommended internal-network access only
    environment:
      # Password is injected via .env (never commit plaintext to the repo)
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}"
      NEO4J_server_memory_heap_initial__size: "1G"
      NEO4J_server_memory_heap_max__size: "2G"
      NEO4J_server_memory_pagecache_size: "1G"
    volumes:
      - neo4j_data:/data           # graph/vector persistence (survives container recreation)
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
  neo4j_logs:
